name: CI Pipeline
on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]
        node-version: ["18"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ── BACKEND SETUP ────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache backend dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov  # Add testing tools

      - name: Lint backend (check syntax)
        run: |
          cd backend
          python -m py_compile app/main.py app/routes/*.py app/services/*.py app/utils/*.py || true

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "⚠️ Some tests failed or no tests exist yet"
        continue-on-error: true

      # ── FRONTEND SETUP ────────────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache frontend dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Build frontend (check for TypeScript errors)
        run: |
          cd frontend
          NEXT_PUBLIC_API_URL=http://localhost:8000 npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      
      # ── DOCKER BUILD ────────────────────────────────────────────────────
      - name: Build Docker services
        run: |
          docker compose build --no-cache
        continue-on-error: true

  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for secrets in code
        run: |
          echo "🔍 Scanning for potential secrets..."
          grep -r "mongodb\+srv" . --exclude-dir=.git --exclude-dir=node_modules --exclude="*.md" && echo "⚠️ Found MongoDB URL pattern" || true
          grep -r "JWT_SECRET\|jwt_secret\|api_key\|API_KEY" . --exclude-dir=.git --exclude-dir=node_modules --exclude="*.md" --exclude="*.env.example" && echo "⚠️ Found potential secrets" || true
          echo "✅ Secret check complete"