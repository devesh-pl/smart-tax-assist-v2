name: SmartTax CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10]
        node-version: [18]

    steps:
    # ------------------------
    # CHECKOUT CODE
    # ------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # ------------------------
    # BACKEND (FASTAPI)
    # ------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # LINT BACKEND
    - name: Install flake8
      run: pip install flake8

    - name: Lint backend
      working-directory: ./backend
      run: flake8 . || true
      # NOTE: "|| true" prevents CI from failing initially (you can remove later)

    # BASIC BACKEND TEST
    - name: Test backend (import check)
      working-directory: ./backend
      run: |
        python -c "from app.main import app"

    # ------------------------
    # FRONTEND (NEXT.JS)
    # ------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    # LINT FRONTEND
    - name: Lint frontend
      working-directory: ./frontend
      run: npm run lint

    # BUILD FRONTEND
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build